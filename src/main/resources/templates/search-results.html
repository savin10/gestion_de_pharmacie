<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultats - PharmaBenin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        #map {
            width: 100%;
            height: calc(100vh - 80px);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 shadow-sm">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-8">
                    <h1 class="text-2xl font-bold text-blue-900">PharmaBenin</h1>
                    <div class="hidden md:block relative flex-1 max-w-md">
                        <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
                            <i class="fas fa-search text-gray-400"></i>
                        </div>
                        <input type="text" id="searchInput"
                               class="w-full pl-10 pr-4 py-2 rounded-full border border-gray-300 focus:border-blue-600 focus:outline-none text-sm"
                               placeholder="Paracétamol">
                    </div>
                </div>
                <nav class="hidden md:flex items-center space-x-8">
                    <a href="/" class="text-gray-600 hover:text-blue-900 transition-colors">Recherche</a>
                    <a href="/pharmacies" class="text-blue-900 font-semibold border-b-2 border-blue-900 pb-1">Pharmacies</a>
                    <a href="#" class="text-gray-600 hover:text-blue-900 transition-colors">Tableau de Bord</a>
                </nav>
                <div class="flex items-center space-x-4">
                    <button class="text-gray-600 hover:text-blue-900">
                        <i class="fas fa-bell text-xl"></i>
                    </button>
                    <button class="text-gray-600 hover:text-blue-900">
                        <i class="fas fa-user-circle text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex h-screen">
        <!-- Left Sidebar - Results List -->
        <div class="w-full md:w-96 bg-white border-r border-gray-200 overflow-y-auto">
            <div class="p-4">
                <!-- Results Header -->
                <div class="mb-4">
                    <h2 class="text-xl font-bold text-gray-900 mb-1">
                        Résultats pour "<span id="searchTerm">Paracétamol</span>"
                    </h2>
                    <p class="text-sm text-gray-600">
                        <span id="pharmacyCount" class="font-semibold text-blue-900">12 Pharmacies</span>
                    </p>
                </div>

                <!-- Filters -->
                <div class="flex flex-wrap gap-2 mb-4">
                    <button class="filter-btn active">
                        <i class="fas fa-check-circle mr-1"></i> En Stock
                    </button>
                    <button class="filter-btn">
                        <i class="fas fa-clock mr-1"></i> Ouvert 24/7
                    </button>
                    <button class="filter-btn">
                        <i class="fas fa-location-arrow mr-1"></i> &lt; 2km
                    </button>
                    <button class="text-blue-900 text-sm font-semibold hover:underline">
                        <i class="fas fa-sliders-h mr-1"></i> Plus de filtres
                    </button>
                </div>

                <!-- Pharmacy List -->
                <div id="pharmacyList" class="space-y-3">
                    <!-- Pharmacy cards will be loaded dynamically -->
                    <div class="p-6 text-center text-gray-400">
                        <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
                        <p>Chargement des résultats...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side - Map -->
        <div class="flex-1 relative">
            <div id="map"></div>
            
            <!-- Map Legend -->
            <div class="absolute top-4 right-4 bg-white rounded-lg shadow-lg p-4 z-10">
                <h4 class="font-bold text-gray-900 mb-2">Légende</h4>
                <div class="space-y-2 text-sm">
                    <div class="flex items-center">
                        <div class="w-3 h-3 rounded-full bg-blue-600 mr-2"></div>
                        <span class="text-gray-700">Sélectionné</span>
                    </div>
                    <div class="flex items-center">
                        <div class="w-3 h-3 rounded-full bg-green-600 mr-2"></div>
                        <span class="text-gray-700">Disponible</span>
                    </div>
                    <div class="flex items-center">
                        <div class="w-3 h-3 rounded-full bg-red-600 mr-2"></div>
                        <span class="text-gray-700">Stock Critique</span>
                    </div>
                </div>
            </div>

            <!-- Map Controls -->
            <div class="absolute bottom-4 right-4 flex flex-col space-y-2 z-10">
                <button class="bg-white rounded-full w-12 h-12 shadow-lg hover:bg-gray-50 transition-colors flex items-center justify-center">
                    <i class="fas fa-plus text-gray-700"></i>
                </button>
                <button class="bg-white rounded-full w-12 h-12 shadow-lg hover:bg-gray-50 transition-colors flex items-center justify-center">
                    <i class="fas fa-minus text-gray-700"></i>
                </button>
                <button class="bg-white rounded-full w-12 h-12 shadow-lg hover:bg-gray-50 transition-colors flex items-center justify-center">
                    <i class="fas fa-location-crosshairs text-gray-700"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 py-4">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center text-xs text-gray-600">
                <div class="mb-2 md:mb-0">
                    <p>&copy; 2024 PharmaBenin - Système National de Gestion Pharmaceutique du Bénin</p>
                </div>
                <div class="flex space-x-4">
                    <a href="#" class="hover:text-blue-900 transition-colors">Mentions Légales</a>
                    <a href="#" class="hover:text-blue-900 transition-colors">Contact</a>
                    <a href="#" class="hover:text-blue-900 transition-colors">Aide</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Fonction callback pour Google Maps
        function initGoogleMaps() {
            console.log('Google Maps loaded successfully');
        }
    </script>
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDXSY8q4e-uU7V4zf9ORzGfvH0lgr4Sl4U&libraries=places,geometry&callback=initGoogleMaps"></script>
    <script src="/js/search-results.js"></script>
</body>
</html>
