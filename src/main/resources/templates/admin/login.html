<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Connexion - PharmaBénin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="min-h-screen flex items-center justify-center">
        <div class="w-full max-w-md">
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="gradient-bg rounded-lg p-4 inline-block">
                    <i class="fas fa-lock text-white text-4xl"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-900 mt-4">Espace Admin</h1>
                <p class="text-gray-600 mt-2">PharmaBénin</p>
            </div>

            <!-- Formulaire de login -->
            <div class="bg-white rounded-xl shadow-md p-8">
                <!-- Messages d'erreur/réussite -->
                <div th:if="${errorMessage}" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4">
                    <i class="fas fa-exclamation-circle mr-2"></i>
                    <span th:text="${errorMessage}"></span>
                </div>

                <div th:if="${successMessage}" class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-4">
                    <i class="fas fa-check-circle mr-2"></i>
                    <span th:text="${successMessage}"></span>
                </div>

                <!-- Formulaire -->
                <form method="post" th:action="@{/admin/authenticate}" class="space-y-4">
                    <!-- Username -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            <i class="fas fa-user mr-2"></i>Nom d'utilisateur
                        </label>
                        <input type="text" name="username" required
                               class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-green-500 focus:outline-none transition"
                               placeholder="Entrez votre nom d'utilisateur">
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            <i class="fas fa-lock mr-2"></i>Mot de passe
                        </label>
                        <input type="password" name="password" required
                               class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-green-500 focus:outline-none transition"
                               placeholder="Entrez votre mot de passe">
                    </div>

                    <!-- Remember me -->
                    <div class="flex items-center">
                        <input type="checkbox" id="rememberMe" name="remember-me" value="on"
                               class="h-4 w-4 text-green-600 focus:ring-green-500 border-gray-300 rounded">
                        <label for="rememberMe" class="ml-2 block text-sm text-gray-600">
                            Se souvenir de moi
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit"
                            class="w-full gradient-bg text-white font-bold py-2 px-4 rounded-lg hover:opacity-90 transition mt-6">
                        <i class="fas fa-sign-in-alt mr-2"></i>Connexion
                    </button>
                </form>

                <!-- Divider -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">Informations de test</span>
                    </div>
                </div>

                <!-- Test Credentials -->
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 text-sm text-blue-800">
                    <p class="font-semibold mb-2"><i class="fas fa-info-circle mr-2"></i>Identifiants de test :</p>
                    <p>Username: <code class="bg-white px-2 py-1 rounded">admin</code></p>
                    <p>Password: <code class="bg-white px-2 py-1 rounded">admin123</code></p>
                </div>
            </div>

            <!-- Footer -->
            <div class="text-center mt-6 text-gray-600">
                <p>&copy; 2026 PharmaBénin - Tous droits réservés</p>
            </div>
        </div>
    </div>
</body>
</html>
