<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier Disponibilité - PharmaBénin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <!-- Header -->
    <header class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <h1 class="text-2xl font-bold">
                    <i class="fas fa-edit mr-2"></i>Modifier Disponibilité
                </h1>
                <a th:href="@{/admin/medicaments/{id}/disponibilites(id=${medicament.id})}" class="mt-4 md:mt-0 text-white hover:opacity-80">
                    <i class="fas fa-arrow-left mr-2"></i>Retour
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-10">
        <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md p-8">
            <!-- Infos -->
            <div class="bg-blue-50 border-l-4 border-blue-600 rounded-lg p-4 mb-6">
                <p class="text-sm text-gray-700">
                    <strong>Médicament:</strong> <span th:text="${medicament.nom}"></span> (<span th:text="${medicament.dosage}"></span>)
                </p>
                <p class="text-sm text-gray-700 mt-1">
                    <strong>Pharmacie:</strong> <span th:text="${disponibilite.pharmacie.nom}"></span>
                </p>
            </div>

            <!-- Formulaire -->
            <form th:action="@{/admin/medicaments/{medId}/disponibilites/{dispoId}/edit(medId=${medicament.id}, dispoId=${disponibilite.id})}"
                  method="get" class="space-y-6">

                <!-- Statut -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-check-circle mr-2"></i>Statut *
                    </label>
                    <select name="disponible" required class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-green-500 focus:outline-none transition">
                        <option value="true" th:selected="${disponibilite.disponible}">Disponible</option>
                        <option value="false" th:selected="${!disponibilite.disponible}">Rupture de Stock</option>
                    </select>
                    <p class="text-xs text-gray-500 mt-1">Changez le statut pour indiquer une rupture</p>
                </div>

                <!-- Quantité -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-cubes mr-2"></i>Quantité *
                    </label>
                    <input type="number" id="quantiteInput" name="quantite" th:value="${disponibilite.quantiteStock}" required min="0"
                           class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-green-500 focus:outline-none transition"
                           placeholder="Ex: 100" onchange="updateStatut()">
                    <p class="text-xs text-gray-500 mt-1">⚠️ Si quantité = 0, le statut passera automatiquement à "Rupture de Stock"</p>
                </div>

                <!-- Buttons -->
                <div class="flex justify-end space-x-4">
                    <a th:href="@{/admin/medicaments/{id}/disponibilites(id=${medicament.id})}"
                       class="bg-gray-400 hover:bg-gray-500 text-white px-6 py-2 rounded-lg font-semibold transition">
                        <i class="fas fa-times mr-2"></i>Annuler
                    </a>
                    <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-semibold transition">
                        <i class="fas fa-save mr-2"></i>Mettre à Jour
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-6 mt-20">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 PharmaBénin - Tous droits réservés.</p>
        </div>
    </footer>

    <script>
        function updateStatut() {
            const quantiteInput = document.getElementById('quantiteInput');
            const disponibeSelect = document.querySelector('select[name="disponible"]');

            // Si quantité = 0, forcer le statut à "Rupture de Stock"
            if (parseInt(quantiteInput.value) === 0) {
                disponibeSelect.value = 'false';
                // Désactiver le select pour éviter que l'utilisateur le change
                disponibeSelect.disabled = true;
                // Afficher un message
                const parent = disponibeSelect.parentElement;
                let message = parent.querySelector('.warning-message');
                if (!message) {
                    message = document.createElement('p');
                    message.className = 'warning-message text-xs text-red-500 mt-1';
                    message.innerHTML = '<i class="fas fa-exclamation-circle mr-1"></i>Quantité = 0 : Statut forcé à "Rupture de Stock"';
                    parent.appendChild(message);
                }
            } else {
                // Si quantité > 0, réactiver le select
                disponibeSelect.disabled = false;
                // Supprimer le message d'avertissement
                const message = disponibeSelect.parentElement.querySelector('.warning-message');
                if (message) {
                    message.remove();
                }
            }
        }

        // Appeler la fonction au chargement de la page
        window.addEventListener('load', updateStatut);
    </script>
</body>
</html>
